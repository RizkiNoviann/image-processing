services:
  postgres:
    image: postgres:17
    container_name: image-postgres
    restart: always
    environment:
      POSTGRES_DB: image_processing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: image-redis
    restart: always
    ports:
      - "6379:6379"